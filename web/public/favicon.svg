<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Music Station">
  <defs>
    <!-- Purple-red gradient: matches the app's magenta accent (#ff2db5)
         but pushed toward fuchsia / purple at the bottom so it reads as
         紫红 instead of pure pink. -->
    <linearGradient id="hp-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ff66cc"/>
      <stop offset="45%"  stop-color="#ff2db5"/>
      <stop offset="100%" stop-color="#8a1466"/>
    </linearGradient>
    <!-- Soft pink halo so the icon stays visible on bookmark thumbnails
         against either light or dark backgrounds. -->
    <radialGradient id="hp-halo" cx="50%" cy="50%">
      <stop offset="55%"  stop-color="#ff2db5" stop-opacity="0"/>
      <stop offset="90%"  stop-color="#ff2db5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ff2db5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Halo -->
  <circle cx="32" cy="32" r="31" fill="url(#hp-halo)"/>

  <!-- Headband: thick rounded arch from one cup to the other -->
  <path d="M 12 36 Q 12 12 32 12 Q 52 12 52 36"
        stroke="url(#hp-grad)"
        stroke-width="5"
        stroke-linecap="round"
        fill="none"/>

  <!-- Left ear cup -->
  <rect x="7"  y="32" width="14" height="22" rx="5" fill="url(#hp-grad)"/>
  <!-- Right ear cup -->
  <rect x="43" y="32" width="14" height="22" rx="5" fill="url(#hp-grad)"/>

  <!-- Cup highlights — vertical strip on the outer edge to give a
       slight 3D sheen at small sizes -->
  <rect x="9"  y="35" width="2.5" height="16" rx="1.2" fill="#ffffff" fill-opacity="0.22"/>
  <rect x="45" y="35" width="2.5" height="16" rx="1.2" fill="#ffffff" fill-opacity="0.22"/>

  <!-- Speaker hollow inside each cup -->
  <circle cx="14"   cy="43" r="3.5" fill="#1a0420" fill-opacity="0.55"/>
  <circle cx="50"   cy="43" r="3.5" fill="#1a0420" fill-opacity="0.55"/>
</svg>
